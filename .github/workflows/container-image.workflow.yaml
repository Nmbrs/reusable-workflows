name: container image build

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Container image tag'
        required: false
        type: string
        default: latest
      target-directory:
        description: "Target working directory"
        required: false
        type: string
        default: "."
    secrets:
      ghcr_token:
        description: 'ghcr creds'
        required: true

jobs:
  ## Build container image and publish it
  build-container-image:
    name: Build container image
    runs-on: ubuntu-20.04

    env:
      CONTAINER_REGISTRY_NAME: 'ghcr.io'
      CONTAINER_REGISTRY_USERNAME: 'nmbrs'
      IMAGE_NAME: nmbrs/${{ github.event.repository.name }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.target-directory }}

    permissions: write-all

    steps:
    
      - name: Checkout
        uses: actions/checkout@v2
        with:
          token: ${{ github.token }}
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.CONTAINER_REGISTRY_NAME }}
          username: ${{ env.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.ghcr_token }}

      - name: Build and push container image
        id: docker_build
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ env.CONTAINER_REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha
